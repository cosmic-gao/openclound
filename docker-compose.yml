# 启动:docker compose up -d --build
# 停止:docker compose down
# 端口全部跟随 .env:容器监听 = agentos 连接 = 主机映射(单一真相源)。

services:
  postgres:
    image: pgvector/pgvector:pg14
    restart: unless-stopped
    env_file:
      - .env
    command: ["-p", "${POSTGRES_PORT:-5432}"]
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -p ${POSTGRES_PORT:-5432}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--port", "${REDIS_PORT:-6379}"]
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p ${REDIS_PORT:-6379} ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  agentos:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    image: agentos:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-2026}:${PORT:-2026}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - agent_workspace:/app/.agent
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,os; urllib.request.urlopen('http://localhost:'+os.environ.get('PORT','2026')+'/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3g

volumes:
  postgres_data:
  redis_data:
  agent_workspace:
