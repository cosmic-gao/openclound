# 自包含栈:agentos + 内置 Postgres(pg14) + Redis。
# cp .env.example .env && 填 OPENAI_* / POSTGRES_PASSWORD && docker compose up -d --build
# 改用托管库:在 .env 设 DATABASE_URL(优先于 POSTGRES_*),并可注释掉 postgres 服务。

services:
  # PostgreSQL 14(+ pgvector,留作日后语义检索;Aegra 持久化:checkpointer/线程/运行/store)
  postgres:
    image: pgvector/pgvector:pg14
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis:多实例 SSE 广播(pub/sub + replay)+ worker 任务队列
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # agentos(Aegra serve;启动自动迁移)
  agentos:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentos:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 容器内连内置服务(覆盖 .env 里给本地直跑用的 localhost)
      - POSTGRES_HOST=postgres
      - REDIS_BROKER_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - RUN_MIGRATIONS_ON_STARTUP=true
      - WORKER_COUNT=3
      - N_JOBS_PER_WORKER=10
    ports:
      - "${PORT:-2026}:${PORT:-2026}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - agent_workspace:/app/.agent
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:$${PORT:-2026}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3g

volumes:
  postgres_data:
  redis_data:
  agent_workspace:
