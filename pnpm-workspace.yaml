# pnpm workspace 定义:声明哪些目录属于本工作区
packages:
  - "apps/*"
  - "packages/*"
  - "configs/*"

# 强制 Node / pnpm 版本满足 package.json engines(pnpm 11 起此设置在此声明,.npmrc 不再读取)
engineStrict: true

# 供应链安全(推荐):不使用发布时间不足 N 分钟的新版本,降低拉到刚发布的恶意/问题版本的风险。
# 注:pnpm 11.5.3 仅在「校验阶段」拒绝、不会在解析阶段自动降级到较旧版本,与高频更新的传递依赖
# (vite/vitest 依赖链中的 electron-to-chromium 等)共存时会阻塞安装;升级到 pnpm 11.7+ 后再启用,
# 并按需用 minimumReleaseAgeExclude 放行内部包与高频传递依赖。
# minimumReleaseAge: 1440
# minimumReleaseAgeExclude:
#   - "@openclound/*"

# 允许执行 postinstall 构建脚本的依赖(pnpm 默认出于安全会阻止)
allowBuilds:
  esbuild: true

# 提示:可启用 catalog 统一管理多个包共享的依赖版本,例如:
# catalog:
#   zod: ^3.23.8
