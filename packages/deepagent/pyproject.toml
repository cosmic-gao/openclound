[project]
name = "deepagent"
version = "0.1.0"
description = "openclound 的 deep agent 基础包:封装 LangChain deepagents 构建深度智能体。"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "August Gao", email = "August.Gao@mspbots.ai" }]
keywords = ["deepagents", "langchain", "langgraph", "agents", "anthropic"]
classifiers = [
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Intended Audience :: Developers",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "deepagents>=0.6.11,<0.7",
    "langchain-anthropic>=1.4.6,<2.0.0",
]

[project.urls]
Homepage = "https://github.com/mspbots/openclound"
Repository = "https://github.com/mspbots/openclound"

[build-system]
requires = ["uv_build>=0.11.22,<0.12"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=8.1.1,<9",
    "ruff>=0.5.0",
    "mypy>=1.10.0",
]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.11"
strict = true

[tool.pytest.ini_options]
minversion = "8.0"
addopts = ["--import-mode=importlib"]
testpaths = ["tests"]
