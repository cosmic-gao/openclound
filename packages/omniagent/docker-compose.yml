# Docker Compose - PostgreSQL + Redis + API
# aegra dev  -> docker compose up postgres -d  (database only, in-memory broker)
# aegra up   -> docker compose up --build      (full stack, Redis broker)

services:
  postgres:
    image: pgvector/pgvector:pg14
    container_name: omniagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omniagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omniagent_secret}
      POSTGRES_DB: ${POSTGRES_DB:-omniagent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      # -h 127.0.0.1 强制 TCP:首次 initdb 的 socket-only 临时实例不会误报 ready
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-omniagent} -d ${POSTGRES_DB:-omniagent} -h 127.0.0.1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: omniagent-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  omniagent:
    build: .
    container_name: omniagent-api
    restart: unless-stopped
    ports:
      - "${PORT:-2026}:${PORT:-2026}"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-omniagent}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-omniagent_secret}
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-omniagent}
      - AEGRA_CONFIG=aegra.json
      - AUTH_TYPE=${AUTH_TYPE:-noop}
      - PORT=${PORT:-2026}
      - REDIS_BROKER_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${PORT:-2026}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./src:/app/src:ro
      - ./aegra.json:/app/aegra.json:ro

volumes:
  postgres_data:
  redis_data:
