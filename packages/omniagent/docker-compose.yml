# 自带 PG(pgvector)+ Redis + omniagent。cp .env.example .env && docker compose up -d --build

services:
  postgres:
    image: pgvector/pgvector:pg14
    restart: unless-stopped
    command: postgres -p 15432
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omniagent}
      POSTGRES_USER: ${POSTGRES_USER:-omniagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omniagent}
    ports:
      - "15432:15432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omniagent} -d ${POSTGRES_DB:-omniagent} -h 127.0.0.1 -p 15432"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --port 16379
    ports:
      - "16379:16379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "16379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  omniagent:
    build:
      context: .
      dockerfile: Dockerfile
    image: omniagent:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "2026:2026"
    volumes:
      - agent_workspace:/app/.agent
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2026/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3g

volumes:
  postgres_data:
  redis_data:
  agent_workspace:
